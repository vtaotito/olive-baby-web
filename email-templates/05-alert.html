<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerta do Sistema</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f4f4; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #F44336; color: white; padding: 30px 20px; border-radius: 8px 8px 0 0; text-align: center; }
    .header h2 { margin: 0; font-size: 24px; font-weight: 600; }
    .content { background: white; padding: 30px; border: 1px solid #e0e0e0; border-top: none; border-radius: 0 0 8px 8px; }
    .footer { text-align: center; margin-top: 20px; color: #888; font-size: 12px; padding: 20px; }
    .message-box { background: #f5f5f5; padding: 15px; margin: 15px 0; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>❌ Falha na API de Pagamento</h2>
    </div>
    <div class="content">
      <p><strong>Componente:</strong> billing</p>
      <p><strong>Nível:</strong> ERROR</p>
      <p><strong>Mensagem:</strong> Stripe webhook signature validation failed.</p>
      <div class="message-box">
        <strong>Detalhes:</strong>
        <pre style="margin: 10px 0; font-size: 12px; overflow-x: auto;">{"eventId": "evt_xxx", "timestamp": "2025-03-06T12:00:00.000Z"}</pre>
      </div>
      <p style="font-size: 12px; color: #666;"><strong>Timestamp:</strong> 2025-03-06T12:00:00.000Z</p>
    </div>
    <div class="footer">
      <p>🌿 <strong>Olive Baby</strong> – Alerta interno</p>
    </div>
  </div>
</body>
</html>
