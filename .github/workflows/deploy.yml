name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e

            docker stop olivebaby-web-app 2>/dev/null && docker rm olivebaby-web-app 2>/dev/null || true

            echo "==> Restarting olivebaby-web..."
            cd /docker/olivebaby-web
            docker compose down --timeout 30
            docker compose up -d

            echo "==> Waiting for web container to start..."
            for i in $(seq 1 60); do
              HEALTH=$(docker inspect olivebaby-web-server --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || echo "waiting")
              STATE=$(docker inspect olivebaby-web-server --format='{{.State.Status}}' 2>/dev/null || echo "absent")

              if [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "unhealthy" ]; then
                echo "  Container is running (health: $HEALTH)"
                break
              fi

              echo "  [$i/60] State: $STATE, Health: $HEALTH"
              sleep 5
            done

            if [ "$STATE" != "running" ]; then
              echo "Container not running!"
              docker compose logs --tail 30
              exit 1
            fi

            echo "==> Deploy successful!"

      - name: Production health check
        run: |
          curl -sf --retry 5 --retry-delay 15 --retry-all-errors \
            https://oliecare.cloud/ -o /dev/null
          echo "Production health check passed!"
