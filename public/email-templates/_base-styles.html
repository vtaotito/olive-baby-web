<!-- Fragmento: estilos base usados em todos os templates. Não abrir sozinho. -->
<!-- Design System OlieCare - Cores atualizadas: #738251 (olive-600), #5a6940 (olive-700), #f7a072 (peach-400) -->
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #2c2c2c; margin: 0; padding: 0; background-color: #f7f8f3; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  .header { background: linear-gradient(135deg, #738251 0%, #5a6940 100%); color: white; padding: 40px 20px; border-radius: 12px 12px 0 0; text-align: center; }
  .header h1 { margin: 0; font-size: 28px; font-weight: 700; }
  .header h2 { margin: 10px 0 0 0; font-size: 24px; font-weight: 600; }
  .content { background: white; padding: 40px 30px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 12px 12px; }
  .button { display: inline-block; padding: 16px 32px; background: linear-gradient(135deg, #738251 0%, #5a6940 100%); color: white; text-decoration: none; border-radius: 8px; margin: 24px 0; font-weight: 600; font-size: 16px; text-align: center; min-width: 200px; }
  .button:hover { opacity: 0.9; }
  .button-secondary { background: #f7f8f3; color: #738251; border: 2px solid #738251; }
  .button-secondary:hover { background: #738251; color: white; }
  .footer { text-align: center; margin-top: 30px; color: #6b7280; font-size: 12px; padding: 20px; }
  .logo { font-size: 32px; margin-bottom: 10px; }
  .warning { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 16px; margin: 20px 0; border-radius: 6px; }
  .info-box { background: #f0f4ed; border-left: 4px solid #738251; padding: 16px; margin: 20px 0; border-radius: 6px; }
  .message-box { background: #f9fafb; padding: 16px; margin: 20px 0; border-radius: 6px; border: 1px solid #e5e7eb; }
  .hero-section { text-align: center; padding: 30px 0; }
  .hero-icon { font-size: 64px; margin-bottom: 16px; }
  .stat-card { background: #f9fafb; border-radius: 8px; padding: 20px; margin: 12px 0; text-align: center; }
  .stat-number { font-size: 32px; font-weight: 700; color: #738251; }
  .stat-label { font-size: 14px; color: #6b7280; margin-top: 4px; }
  .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .feature-item { background: #f9fafb; padding: 16px; border-radius: 8px; text-align: center; }
  .feature-icon { font-size: 32px; margin-bottom: 8px; }
  .feature-title { font-weight: 600; font-size: 14px; color: #2c2c2c; }
  @media only screen and (max-width: 600px) {
    .container { padding: 10px; }
    .content { padding: 24px 20px; }
    .header { padding: 30px 15px; }
    .feature-grid { grid-template-columns: 1fr; }
    .button { width: 100%; min-width: auto; }
  }
</style>
