# =====================================================================
# OlieCare - Nginx proxy (VPS)
# =====================================================================
# Inclui detecção de crawlers (SEO): quando o user-agent é um bot,
# o nginx serve uma versão SSR do blog (HTML pronto, com conteúdo real,
# canonical específico do post e Schema.org BlogPosting) via API.
# Para humanos, continua servindo o SPA React normalmente.
#
# Implementação segura: usa rewrite ... last + locations internal,
# evitando o antipattern "if dentro de location com proxy_pass"
# (ver http://nginx.org/en/docs/http/converting_rewrite_rules.html
#  e https://www.nginx.com/resources/wiki/start/topics/depth/ifisevil/).
# =====================================================================

# ---------------------------------------------------------------------
# Map: detectar user-agents de crawlers / previewers de redes sociais.
# Inclui Googlebot, Bingbot, Yandex, Baidu, DuckDuckGo, Applebot,
# facebookexternalhit (FB/Instagram/WhatsApp), Twitterbot/X, LinkedInBot,
# Slackbot, Telegrambot, Discordbot, Pinterest, etc.
# ---------------------------------------------------------------------
map $http_user_agent $oc_is_bot {
    default                                 0;
    "~*googlebot"                           1;
    "~*google-inspection-tool"              1;
    "~*google-structured-data-testing-tool" 1;
    "~*googleother"                         1;
    "~*adsbot-google"                       1;
    "~*apis-google"                         1;
    "~*mediapartners-google"                1;
    "~*bingbot"                             1;
    "~*bingpreview"                         1;
    "~*msnbot"                              1;
    "~*duckduckbot"                         1;
    "~*yandex"                              1;
    "~*baiduspider"                         1;
    "~*applebot"                            1;
    "~*facebookexternalhit"                 1;
    "~*facebookcatalog"                     1;
    "~*meta-externalagent"                  1;
    "~*whatsapp"                            1;
    "~*twitterbot"                          1;
    "~*linkedinbot"                         1;
    "~*slackbot"                            1;
    "~*telegrambot"                         1;
    "~*discordbot"                          1;
    "~*pinterest"                           1;
    "~*redditbot"                           1;
    "~*embedly"                             1;
    "~*vkshare"                             1;
    "~*w3c_validator"                       1;
    "~*ia_archiver"                         1;
    "~*archive.org_bot"                     1;
    "~*ahrefsbot"                           1;
    "~*semrushbot"                          1;
    "~*mj12bot"                             1;
    "~*lighthouse"                          1;
    "~*chrome-lighthouse"                   1;
    "~*petalbot"                            1;
    "~*screaming frog"                      1;
}

# ---------------------------------------------------------------------
# HTTP → HTTPS redirect (exceto certbot)
# ---------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name oliecare.cloud www.oliecare.cloud _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------
# HTTPS principal
# ---------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name oliecare.cloud www.oliecare.cloud;

    ssl_certificate /etc/letsencrypt/live/oliecare.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oliecare.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # -----------------------------------------------------------------
    # Sitemap dinâmico do blog (alias simpático para /api/v1/blog/sitemap).
    # O sitemap index em /sitemap.xml (estático no SPA) aponta para cá.
    # -----------------------------------------------------------------
    location = /sitemap-blog.xml {
        proxy_pass http://olivebaby-api:4000/api/v1/blog/sitemap;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=300, s-maxage=600" always;
    }

    # -----------------------------------------------------------------
    # API
    # -----------------------------------------------------------------
    location /api/ {
        proxy_pass http://olivebaby-api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
    }

    location /ads-api/ {
        proxy_pass http://oliecare-ads-agent:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # -----------------------------------------------------------------
    # Blog: SSR para crawlers, SPA para humanos.
    #
    # Estratégia segura (sem antipattern "if + proxy_pass"):
    #   - Se o user-agent for bot, fazemos rewrite para uma URL interna
    #     (__blog-ssr) e usamos "last" para o nginx reprocessar as locations.
    #   - A location __blog-ssr é marcada com `internal` → só acessível via
    #     rewrite interno, nunca pelo cliente.
    #   - Se não for bot, o fluxo cai no proxy normal para o SPA.
    # -----------------------------------------------------------------

    # Post individual: /blog/<slug>
    location ~ ^/blog/(?<oc_slug>[A-Za-z0-9][A-Za-z0-9_\-]*)/?$ {
        if ($oc_is_bot = 1) {
            rewrite ^ /__blog-ssr-post/$oc_slug last;
        }
        proxy_pass http://olivebaby-web-app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/__blog-ssr-post/(?<oc_ssr_slug>.+)$ {
        internal;
        proxy_pass http://olivebaby-api:4000/api/v1/blog/ssr/$oc_ssr_slug;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Listagem: /blog ou /blog/
    location ~ ^/blog/?$ {
        if ($oc_is_bot = 1) {
            rewrite ^ /__blog-ssr-list last;
        }
        proxy_pass http://olivebaby-web-app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /__blog-ssr-list {
        internal;
        proxy_pass http://olivebaby-api:4000/api/v1/blog/ssr$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # -----------------------------------------------------------------
    # Catch-all para resto do site (SPA).
    # -----------------------------------------------------------------
    location / {
        proxy_pass http://olivebaby-web-app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
